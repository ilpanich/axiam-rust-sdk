name: Coverage

# Line coverage for the SDK test suite, reported to Coveralls.
#
# Runs on every PR and on every push to main. The main-branch runs are what
# establish the baseline Coveralls diffs a PR against, so both triggers are
# required — a PR-only workflow would have nothing to compare to.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: cargo-llvm-cov -> Coveralls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          df -h

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable (2026-03-27)
        with:
          toolchain: stable
          # cargo-llvm-cov reads the profraw files the instrumented binaries
          # emit; llvm-tools ships the llvm-profdata/llvm-cov it shells out to.
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      # build.rs shells out to protoc for the gRPC codegen pulled in by
      # --all-features; without it the crate does not compile here either.
      - name: Install protoc (build.rs gRPC codegen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853  # v2.83.2
        with:
          tool: cargo-llvm-cov

      # --all-features so the grpc/amqp/actix code paths are instrumented too;
      # with the default feature set, `actix` (and its §10 route guard, CSRF
      # check included) would silently count as zero-coverage dead code.
      - name: Collect coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      # Regression gate: fail if line coverage drops below the floor. Set below
      # the current level (~90%) so it never false-fails; ratchet upward as
      # coverage rises. The practical ceiling is bounded by amqp/consumer.rs's
      # broker-dependent `consume()` loop (no live broker in CI) and by test
      # handler closures that are deliberately never invoked (the tests assert
      # the handler is NOT called on a rejected delivery). Reuses the profdata
      # collected above (no re-run).
      - name: Enforce coverage floor
        run: cargo llvm-cov report --fail-under-lines 89

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
