name: SDK CI — Rust

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'proto/**'
      # The server-generated HMAC reference vectors (CONTRACT.md §8): a
      # re-vendored fixture must re-run the byte-parity tests.
      - 'testdata/**'
      - 'Cargo.toml'
      - 'build.rs'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      # The behavioural contract and the server's OpenAPI spec are the inputs
      # this SDK is written against: a change to either must re-run the suite
      # even when no Rust file moved.
      - 'CONTRACT.md'
      - 'openapi.json'
      - '.github/workflows/sdk-ci-rust.yml'
  push:
    tags:
      # Standalone-repo release tags are plain vX.Y.Z. The monorepo's
      # axiam-rust-sdk/vX.Y.Z prefix existed only to disambiguate one artifact
      # among many in a shared tag namespace.
      - 'v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  scaffold-check:
    name: SDK Scaffold Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Verify LICENSE file
        run: test -f LICENSE

  # buf lints the protos this crate generates its gRPC stubs from. `buf lint`,
  # `buf format` and `buf breaking` are fully local (no BSR round-trip); only
  # `buf generate` needs the remote plugins declared in buf.gen.yaml, and CI
  # never runs it — build.rs's tonic-prost-build pipeline is the codegen path
  # used here and at publish time.
  proto-lint:
    name: Proto lint (buf)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99  # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: buf lint
        run: buf lint
      - name: buf format check
        run: buf format --diff --exit-code
      # The wire contract is consumed by seven SDKs and by live clients, so a
      # wire-breaking proto change must be a deliberate, reviewed act.
      - name: buf breaking (against main)
        run: buf breaking --against '.git#branch=origin/main'

  test:
    name: Test (${{ matrix.toolchain }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # D-10: MSRV (1.88, from Cargo.toml's rust-version) is CI-enforced
        # alongside the normal stable toolchain.
        toolchain: ["1.88", stable]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable (2026-03-27)
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      # build.rs runs tonic-prost-build gRPC codegen (grpc feature, pulled in
      # by --all-features), which shells out to protoc. Without it, codegen is
      # skipped and the crate's include!("../gen/axiam.v1.rs") fails to
      # compile. Ubuntu's protobuf-compiler is sufficient for prost/tonic.
      - name: Install protoc (build.rs gRPC codegen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Style gates run on stable only: clippy's lint set grows with every
      # release, so running it under the pinned MSRV compiler would turn each
      # new lint into a spurious MSRV-job failure. The MSRV job's job is to
      # prove the crate still COMPILES on 1.88, not to re-police style.
      - name: Format check
        if: matrix.toolchain == 'stable'
        run: cargo fmt --all --check

      - name: Clippy (all targets, all features)
        if: matrix.toolchain == 'stable'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (all features)
        run: cargo build --all-features

      - name: Test (all features)
        run: cargo test --all-features

      # `#![warn(missing_docs)]` in lib.rs keeps every public item documented;
      # this step promotes it (plus broken intra-doc links) to a hard CI
      # failure so docs.rs coverage for the published crate cannot regress.
      # docs.rs rebuilds this crate's API reference automatically on every
      # crates.io release, which is why this repo ships no Pages docs job.
      - name: Docs coverage gate (docs.rs)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps

      # Ignored advisory rationale:
      #   RUSTSEC-2023-0071 — Marvin attack (rsa timing sidechannel); no upstream fix.
      #   `rsa` is pulled in transitively by jsonwebtoken for RS* algorithm support.
      #   The SDK only VERIFIES tokens (public-key ops) and AXIAM signs with EdDSA
      #   (Ed25519), so the vulnerable RSA private-key path is never exercised.
      - name: Dependency vulnerability scan (CI-03)
        if: matrix.toolchain == 'stable'
        run: |
          cargo install cargo-audit --locked
          cargo audit --ignore RUSTSEC-2023-0071

      - name: Build examples (all features)
        run: cargo build --examples --all-features

      # SC#3 / T-16-22: no JWT-shaped ("eyJ"-prefixed) token strings may appear
      # anywhere in this SDK's own compiled debug artifacts — Sensitive<T> must
      # keep token values out of debug output.
      - name: Leak gate — no JWT-shaped strings in compiled artifacts (SC#3)
        run: |
          if grep -r 'eyJ' target/debug/ 2>/dev/null | grep -v '^Binary file' | grep -q .; then
            echo "FAIL: found 'eyJ'-prefixed (JWT-shaped) strings in target/debug/"
            grep -r 'eyJ' target/debug/ 2>/dev/null | grep -v '^Binary file' || true
            exit 1
          fi
          echo "OK: no JWT-shaped strings found in target/debug/"

      # §6 / T-16-23: strict TLS is always on; the only escape hatch is
      # with_custom_ca(pem) — there must be no insecure/skip-verification
      # surface anywhere in the SDK's own source tree.
      - name: TLS-lint gate — no TLS-bypass patterns (§6)
        run: |
          if grep -rniE 'danger_accept_invalid_certs|insecureskipverify|skip_tls|allow_insecure|verify_peer\(false\)' src/ 2>/dev/null | grep -q .; then
            echo "FAIL: found a TLS-bypass pattern under src/"
            grep -rniE 'danger_accept_invalid_certs|insecureskipverify|skip_tls|allow_insecure|verify_peer\(false\)' src/ || true
            exit 1
          fi
          echo "OK: no TLS-bypass patterns found under src/"

      # SC#5 / T-16-24: the gRPC stubs must be generated BEFORE packaging, so
      # the extracted tarball (which ships no proto/ and cannot run protoc)
      # compiles standalone. Building with the grpc feature invokes build.rs's
      # codegen, the local equivalent of `buf generate`.
      - name: Pre-generate gRPC stubs (build.rs codegen)
        run: cargo build --features grpc

      # --allow-dirty is required here (not a shortcut around verification):
      # src/gen/ is gitignored (D-09 — generated stubs are never committed),
      # but cargo package's dirty-check still flags it as "uncommitted" because
      # it is a real, present file included via the Cargo.toml `include` list.
      # This does not weaken the gate — the actual package contents and the
      # compile-from-tarball verification are unaffected; only cargo's
      # git-cleanliness pre-check is bypassed for this one known-generated,
      # intentionally-gitignored path.
      # Publish-gate the new proc-macro crate. axiam-sdk itself cannot be dry-run
      # published on a PR: it depends on axiam-sdk-macros with an unpublished
      # `=`-version path dep, and `cargo package`/`publish` for the umbrella resolves
      # that dependency from the registry (co-packaging unpublished siblings via
      # `--workspace` only works on newer cargo, not the 1.88 MSRV toolchain, and
      # `publish --workspace` is nightly-only — rust-lang/cargo#10948). The umbrella's
      # build is already covered by the build/test jobs above, and its real
      # publish-verify runs in the release job, which publishes axiam-sdk-macros first
      # so the dependency resolves.
      - name: Dry-run publish gate (SC#5)
        run: cd axiam-sdk-macros && cargo publish --dry-run --all-features --allow-dirty

  # Publishing to crates.io is IRREVERSIBLE — a version number can never be
  # reclaimed. Git tags are NOT branch-scoped, so without this gate a release
  # tag cut on a feature branch would ship unreviewed code to the world under a
  # version that can never be reused. The publish job below `needs:` this.
  verify-tag-on-main:
    name: Verify tag is on main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Assert the tagged commit is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is NOT on origin/main. Release tags must be cut from main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on origin/main."

  publish:
    name: Publish to crates.io
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    # Manual-on-tag, side-effecting job: it runs only when a maintainer pushes
    # a tag matching vX.Y.Z. It is never triggered by a PR, so
    # CARGO_REGISTRY_TOKEN is never exposed to PR-triggered jobs (T-16-26).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88  # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      # The tag names the version the world will see; Cargo.toml names the
      # version actually uploaded. If they disagree, crates.io gets the
      # Cargo.toml one under a tag documenting something else — and neither
      # number can ever be republished. Fail closed instead.
      - name: Assert tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          # Both workspace members (axiam-sdk and the version-locked companion
          # axiam-sdk-macros) are published together and MUST carry the tagged
          # version — axiam-sdk depends on axiam-sdk-macros with `=<version>`,
          # so a mismatched pair would fail to resolve at publish time anyway;
          # this check surfaces the mistake up front with a clear message.
          manifest_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; pkgs=json.load(sys.stdin)["packages"]; print(next(p["version"] for p in pkgs if p["name"]=="axiam-sdk"))')"
          macros_version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; pkgs=json.load(sys.stdin)["packages"]; print(next(p["version"] for p in pkgs if p["name"]=="axiam-sdk-macros"))')"
          if [ "${tag_version}" != "${manifest_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies version ${tag_version}, but axiam-sdk Cargo.toml declares ${manifest_version}."
            exit 1
          fi
          if [ "${tag_version}" != "${macros_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} implies version ${tag_version}, but axiam-sdk-macros Cargo.toml declares ${macros_version}."
            exit 1
          fi
          echo "OK: tag ${GITHUB_REF_NAME} matches both axiam-sdk and axiam-sdk-macros version ${manifest_version}."

      - name: Install protoc (build.rs gRPC codegen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # D-09: regenerate-and-bundle the gRPC stubs before publishing so
      # crates.io consumers (who have neither proto/ nor protoc) get a
      # self-contained crate. build.rs's tonic-prost-build codegen targets the
      # same src/gen output directory as `buf generate` (buf.gen.yaml); either
      # path produces an equivalent axiam.v1 module, so enabling the grpc
      # feature is sufficient — no buf CLI invocation is required in this job.
      - name: Regenerate gRPC stubs for the published artifact (D-09)
        run: cargo build --features grpc

      # See the test job's Dry-run publish gate comment: --allow-dirty is
      # required solely because the gitignored, build.rs-generated src/gen/ is
      # present-but-uncommitted by design (D-09).
      - name: Verify axiam-sdk-macros before publish (SC#5)
        run: cd axiam-sdk-macros && cargo publish --dry-run --all-features --allow-dirty

      # Publish both members in dependency order on stable cargo (`cargo publish
      # --workspace` is nightly-only, #10948): the companion proc-macro crate first,
      # then axiam-sdk, which `=`-depends on it. `cargo publish` waits for each newly
      # published crate to appear in the registry index before returning, so axiam-sdk's
      # dependency on axiam-sdk-macros resolves by the time it publishes.
      - name: Publish axiam-sdk-macros to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cd axiam-sdk-macros && cargo publish --all-features --allow-dirty

      - name: Publish axiam-sdk to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --all-features --allow-dirty
